<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-head">
        <h1 class="page-title">Service Manager</h1>
      </header>

      <section class="card section">
        <div class="section-head">
          <h2 class="section-title">Overview</h2>
        </div>

        <div class="overview-grid">
          <div class="overview-card">
            <p class="overview-label">Hosts</p>
            <p id="stat-hosts" class="overview-value">0</p>
          </div>
          <div class="overview-card">
            <p class="overview-label">Tunnels</p>
            <p id="stat-forwards" class="overview-value">0</p>
            <div id="stat-tunnel-detail" class="overview-sub-stats">
              <span class="overview-sub-stat sub-stat-running"><span class="overview-sub-dot"></span><span id="stat-tunnel-running">0</span> running</span>
              <span class="overview-sub-stat sub-stat-stopped"><span class="overview-sub-dot"></span><span id="stat-tunnel-stopped">0</span> stopped</span>
              <span class="overview-sub-stat sub-stat-errors"><span class="overview-sub-dot"></span><span id="stat-tunnel-errors">0</span> errors</span>
            </div>
          </div>
          <div class="overview-card">
            <p class="overview-label">Services</p>
            <p id="stat-services" class="overview-value">0</p>
            <div id="stat-service-detail" class="overview-sub-stats">
              <span class="overview-sub-stat sub-stat-running"><span class="overview-sub-dot"></span><span id="stat-service-running">0</span> running</span>
              <span class="overview-sub-stat sub-stat-stopped"><span class="overview-sub-dot"></span><span id="stat-service-stopped">0</span> stopped</span>
              <span class="overview-sub-stat sub-stat-errors"><span class="overview-sub-dot"></span><span id="stat-service-errors">0</span> errors</span>
            </div>
          </div>
        </div>

        <div class="quick-actions">
          <button id="qa-add-host-btn" type="button" class="btn btn-primary btn-sm">Add Host</button>
          <button id="qa-import-config-btn" type="button" class="btn btn-secondary btn-sm">Import Config</button>
          <button id="qa-export-config-btn" type="button" class="btn btn-secondary btn-sm">Export Config</button>
        </div>

        <p id="update-status-hint" class="update-status-hint hidden"></p>

        <div id="page-message" class="message-banner message-default hidden" role="status" aria-live="polite">
          <span id="page-message-text" class="message-text"></span>
          <button
            id="page-message-close-btn"
            type="button"
            class="message-close"
            aria-label="Dismiss message"
          >
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
          </button>
        </div>

        <p id="overview-hint" class="overview-hint hidden">
          No hosts yet. Start by creating your first host.
        </p>
      </section>

      <section class="card section">
        <div class="section-head">
          <h2 class="section-title">Hosts</h2>
        </div>
        <div class="table-wrap">
          <table>
            <tbody id="host-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="service-log-dialog" class="host-dialog">
      <div class="dialog-panel">
        <div class="dialog-head">
          <h2 id="service-log-title" class="section-title">Service Logs</h2>
          <button id="close-service-log-dialog-btn" type="button" class="icon-btn" aria-label="Close"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg></button>
        </div>
        <label class="forward-auto">
          <input id="log-auto-scroll" type="checkbox" class="checkbox" checked />
          Auto Scroll
        </label>
        <div id="service-log-terminal" class="terminal-log"></div>
      </div>
    </dialog>

    <dialog id="host-dialog" class="host-dialog">
      <div class="dialog-panel">
        <div class="dialog-head">
          <h2 id="host-dialog-title" class="section-title">Add Host</h2>
          <button id="close-host-dialog-btn" type="button" class="icon-btn" aria-label="Close"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg></button>
        </div>

        <div id="host-dialog-message" class="message-banner message-default hidden" role="status" aria-live="polite">
          <span id="host-dialog-message-text" class="message-text"></span>
          <button
            id="host-dialog-message-close-btn"
            type="button"
            class="message-close"
            aria-label="Dismiss message"
          >
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
          </button>
        </div>

        <form id="host-form" class="form-stack">
          <input type="hidden" id="host-id" />

          <div class="form-row">
            <label class="field field-name field-xs">
              Name
              <input id="name" type="text" required class="input" />
            </label>
          </div>

          <div class="form-row">
            <label class="field field-host field-xs">
              SSH Host
              <input id="ssh-host" type="text" required class="input" />
            </label>

            <label class="field field-port field-xs">
              SSH Port
              <input id="ssh-port" type="number" min="1" max="65535" value="22" required class="input" />
            </label>

            <label class="field field-user field-xs">
              Username
              <input id="username" type="text" required class="input" />
            </label>
          </div>

          <div class="form-row">
            <label class="field field-auth field-xs">
              Auth Type
              <select id="auth-type" class="input">
                <option value="privateKey">Private Key</option>
                <option value="password">Password</option>
              </select>
            </label>

            <label id="password-row" class="field field-password field-xs hidden">
              Password
              <input id="password" type="password" class="input" />
            </label>

            <div id="private-key-row" class="private-key-wrap">
              <label class="field field-privatekey field-xs">
                Private Key
                <textarea
                  id="private-key"
                  rows="1"
                  placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"
                  class="input"
                ></textarea>
              </label>
              <button id="import-private-key-btn" type="button" class="btn btn-secondary btn-sm btn-nowrap">
                Import
              </button>
            </div>

            <label id="passphrase-row" class="field field-passphrase field-xs hidden">
              Passphrase (Optional)
              <input id="passphrase" type="password" class="input" />
            </label>
          </div>

          <div class="subcard">
            <div class="subcard-head">
              <h3 class="subcard-title">Jump Servers (Optional)</h3>
              <div class="subcard-actions">
                <button id="add-jump-host-btn" type="button" class="btn btn-secondary btn-sm">Add Hop</button>
                <label class="forward-auto">
                  <input id="use-jump-host" type="checkbox" class="checkbox" />
                  Enable
                </label>
              </div>
            </div>

            <div id="jump-host-section" class="hidden">
              <div id="jump-host-editor-list" class="forward-list"></div>
            </div>
          </div>

          <div class="subcard">
            <div class="subcard-head">
              <h3 class="subcard-title">Forwarding Rules</h3>
              <button id="add-forward-btn" type="button" class="btn btn-secondary btn-sm">Add Rule</button>
            </div>
            <div id="forward-editor-list" class="forward-list"></div>
          </div>

          <div class="subcard">
            <div class="subcard-head">
              <h3 class="subcard-title">Services</h3>
              <button id="add-service-btn" type="button" class="btn btn-secondary btn-sm">Add Service</button>
            </div>
            <div id="service-editor-list" class="forward-list"></div>
          </div>

          <div class="form-actions">
            <button id="save-host-btn" type="submit" class="btn btn-primary">Save Host</button>
            <button id="reset-btn" type="button" class="btn btn-secondary">Reset</button>
            <button id="cancel-host-dialog-btn" type="button" class="btn btn-secondary">Cancel</button>
          </div>
        </form>

      </div>
    </dialog>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
